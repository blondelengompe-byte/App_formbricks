name: ci-cd

on:
  push:
    branches: ["main"]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy on EC2 (SSM)
        run: |
          aws ssm send-command \
            --region ${{ secrets.AWS_REGION }} \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Formbricks" \
            --parameters 'commands=["export HOME=/root","git config --system --add safe.directory /opt/formbricks","cd /opt/formbricks","git reset --hard","git pull","docker logout || true","aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}","sed -i s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/ .env","docker compose pull app || docker compose build app","docker compose up -d --remove-orphans --scale app=2","docker system prune -f"]'
