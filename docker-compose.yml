
services:
  app:
    build: .
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const req=http.get('http://localhost:3000/',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));\""]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 300s
    networks:
      - app-net
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-group: /formbricks/app
        awslogs-create-group: "true"

  db:
    image: pgvector/pgvector:pg15
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-group: /formbricks/db
        awslogs-create-group: "true"

  redis:
    image: valkey/valkey:7.2-alpine
    command: valkey-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-net
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-group: /formbricks/redis
        awslogs-create-group: "true"

  nginx:
    image: owasp/modsecurity-crs:nginx
    user: "0:0"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/modsecurity.conf.template:/etc/nginx/templates/modsecurity.d/modsecurity.conf.template:ro
      - ./nginx/crs-setup.conf.template:/etc/nginx/templates/modsecurity.d/setup.conf.template:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-net
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-group: /formbricks/nginx
        awslogs-create-group: "true"

networks:
  app-net:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
